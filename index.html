<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Header & Payload Vercel</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            background-color: #f9fafb;
            color: #111827;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        pre {
            background-color: #1f2937;
            color: #e5e7eb;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>Inspeksi Request HTTP</h2>
    <p>Klik tombol di bawah ini untuk mengirim request POST tiruan ke serverless function Vercel.</p>
    
    <button onclick="testEndpoint()">Kirim POST Request</button>

    <h3>Hasil Response:</h3>
    <pre id="response-output">Menunggu tindakan...</pre>

    <script>
        async function testEndpoint() {
            const outputBox = document.getElementById('response-output');
            outputBox.textContent = "Loading...";

            try {
                // Menyiapkan payload simulasi
                const dataPayload = {
                    message: "Ini adalah tes payload",
                    timestamp: new Date().toISOString(),
                    user_id: 12345
                };

                // Melakukan request ke serverless function
                const response = await fetch('/api/check-headers', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Custom-Header': 'NilaiHeaderRahasia',
                        'Authorization': 'Bearer token_simulasi_123'
                    },
                    body: JSON.stringify(dataPayload)
                });

                // Mem-parsing dan menampilkan hasil
                const result = await response.json();
                outputBox.textContent = JSON.stringify(result, null, 4);

            } catch (error) {
                outputBox.textContent = "Terjadi kesalahan: " + error.message;
            }
        }
    </script>
</body>
</html>

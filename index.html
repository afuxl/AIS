<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Vercel ke Beeceptor (Raw JSON)</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            background-color: #f9fafb;
            color: #111827;
        }
        textarea {
            width: 100%;
            height: 150px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 10px;
            box-sizing: border-box;
            background-color: #ffffff;
        }
        button {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #059669;
        }
        pre {
            background-color: #1f2937;
            color: #e5e7eb;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
        }
        .error {
            color: #dc2626;
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <h2>Input Raw JSON (POST ke Beeceptor)</h2>
    <p>Masukkan payload JSON Anda pada kotak di bawah ini.</p>

    <div id="error-msg" class="error">Error: Format JSON tidak valid! Pastikan menggunakan tanda kutip ganda ("").</div>
    
    <textarea id="json-input">
{
    "nama_event": "uji_coba_raw_input",
    "angka_acak": 99,
    "pesan": "Halo dari Vercel!"
}
    </textarea>
    
    <button onclick="testBackendFetch()">Kirim POST Request</button>

    <h3>Hasil Response dari Backend:</h3>
    <pre id="response-output">Menunggu tindakan...</pre>

    <script>
        async function testBackendFetch() {
            const outputBox = document.getElementById('response-output');
            const jsonInputBox = document.getElementById('json-input');
            const errorMsg = document.getElementById('error-msg');
            
            let parsedData;

            // Memeriksa apakah teks di textarea adalah JSON yang valid
            try {
                parsedData = JSON.parse(jsonInputBox.value);
                errorMsg.style.display = 'none';
            } catch (e) {
                errorMsg.style.display = 'block';
                outputBox.textContent = "Pengiriman dibatalkan karena format JSON tidak valid.";
                return;
            }

            outputBox.textContent = "Loading... Meneruskan payload ke Beeceptor melalui Vercel";

            try {
                // Mengirim payload JSON ke backend Vercel
                const response = await fetch('/api/check-header', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(parsedData)
                });

                const result = await response.json();
                outputBox.textContent = JSON.stringify(result, null, 4);

            } catch (error) {
                outputBox.textContent = "Terjadi kesalahan: " + error.message;
            }
        }
    </script>
</body>
</html>
